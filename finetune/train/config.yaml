# Training config for gemma4-abliterated-comfyui-mcp (see finetune/README.md).
# Run on a RunPod A100 80GB / RTX Pro 6000; verify the two TEMPLATE_* markers
# against tokenizer.apply_chat_template output on the pod before training.
#
# SIZE LADDER — we train the SAME dataset onto every abliterated Gemma 4 size so
# users pick by their VRAM budget / deployment split (local LLM + local gen,
# local LLM + RunPod gen, or small LLM everywhere). Select with --size on
# train_qlora.py (default: the `size` key below). All use identical data +
# hyperparameters except max_seq_length, which scales down for the small models
# so they fit modest GPUs. Approx inference footprint at q4_k_m:
#   size   base_model (huihui-ai/…)                     QLoRA train VRAM   local run @q4
#   e2b    Huihui-gemma-4-E2B-it-abliterated            ~8 GB              ~2 GB
#   e4b    Huihui-gemma-4-E4B-it-abliterated            ~10 GB             ~3.5 GB   ← "small, most users"
#   12b    Huihui-gemma-4-12B-it-abliterated            ~16 GB             ~8 GB     ← default sweet spot
#   31b    Huihui-gemma-4-31B-it-abliterated            ~22 GB             ~20 GB    ← "full local GPU"
# (26B-A4B MoE intentionally omitted — QLoRA+MoE routing interact poorly.)

size: 12b
size_ladder:
  e2b:  { base_model: huihui-ai/Huihui-gemma-4-E2B-it-abliterated, max_seq_length: 32768 }
  e4b:  { base_model: huihui-ai/Huihui-gemma-4-E4B-it-abliterated, max_seq_length: 32768 }
  12b:  { base_model: huihui-ai/Huihui-gemma-4-12B-it-abliterated, max_seq_length: 49152 }
  # 31B base picked by bake-off (2026-07-04, full-surface arena, Q6_K on A100):
  # huihui v2 17/20 vs DavidAU DECKARD-HERETIC 16/20 — DECKARD also no-tool-call
  # FAILED `health` and wandered 18 rounds on `multiout` (creative-tuning tax).
  31b:  { base_model: huihui-ai/Huihui-gemma-4-31B-it-abliterated-v2, max_seq_length: 49152 }

# Overridden per-size from size_ladder above; left here as the resolved default.
base_model: huihui-ai/Huihui-gemma-4-12B-it-abliterated
output_dir: outputs/gemma4-comfyui-mcp

# Full tool list (~30-40K tokens) + trajectory must fit. If OOM on 80GB,
# drop to 32768 and enable the trimmed-context dataset variant.
max_seq_length: 49152
load_in_4bit: true

lora:
  r: 32
  alpha: 32
  dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.001
  optim: adamw_8bit
  logging_steps: 5
  save_steps: 200
  seed: 3407

# Loss masking: train only on assistant turns. These are the Gemma 4 turn
# markers per Unsloth's docs — VERIFY on the pod by printing one rendered
# sample (prepare_dataset.py --print-sample) before launching.
template:
  instruction_part: "<|turn>user"
  response_part: "<|turn>model"

data:
  train_file: ../data/train.jsonl
  val_file: ../data/val.jsonl
  tools_file: ../data/tools-full.json

export:
  gguf_quants: [q4_k_m, q5_k_m, q8_0]
  hf_repo: ""   # e.g. artokun/gemma4-12b-abliterated-comfyui-mcp (set to push)
